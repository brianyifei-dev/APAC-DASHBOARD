name: Refresh theme board

on:
  schedule:
    # 09:30 UTC = 19:30 AEST / 20:30 AEDT — evening APAC refresh after ASX & HKEX close
    - cron: '30 9 * * 1-5'
    # Morning re-sync of US benchmarks & RS after US close (Mon-Fri UTC = same-day US sessions)
    - cron: '15 21 * * 1-5'
    - cron: '15 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install yfinance pandas pandas-datareader
      - run: python scripts/build_data.py
      - name: Commit snapshot
        run: |
          git config user.name  "theme-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/snapshot.json
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
